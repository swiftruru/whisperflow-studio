appId: com.ruru.whisperflow-studio
productName: WhisperFlow Studio
publish: null
directories:
  output: dist

# Stable, version-less artifact names so the README's
# `https://github.com/<repo>/releases/latest/download/<file>` buttons keep
# working across every release without editing the README.  ${arch}
# expands to arm64 / x64 / armv7l depending on the target.
files:
  - src/**
  - preload/**
  - assets/**
  - settings.example.json
  - NOTICES.md
extraResources:
  - from: python
    to: python
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.pytest_cache/**"
      - "!**/.venv/**"
      - "!**/.venv-test/**"
  - from: bridge
    to: bridge
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  category: public.app-category.utilities
  artifactName: WhisperFlow-Studio-${arch}.${ext}

win:
  target: nsis
  icon: assets/icon.png
  artifactName: WhisperFlow-Studio-Setup.${ext}

linux:
  target: AppImage
  icon: assets/icon.png
  artifactName: WhisperFlow-Studio.${ext}
