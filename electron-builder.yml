appId: com.ruru.whisperflow-studio
productName: WhisperFlow Studio
publish: null
directories:
  output: dist
files:
  - src/**
  - preload/**
  - assets/**
extraResources:
  - from: python
    to: python
  - from: bridge
    to: bridge
mac:
  target: dmg
  icon: assets/icon.icns
  category: public.app-category.utilities
win:
  target: nsis
  icon: assets/icon.png
linux:
  target: AppImage
  icon: assets/icon.png
