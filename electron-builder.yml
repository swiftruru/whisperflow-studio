appId: com.ruru.whisperflow-studio
productName: WhisperFlow Studio
# Publish target — only used so electron-builder generates the
# `latest.yml` / `latest-mac.yml` / `latest-linux.yml` update-metadata
# files alongside the installer artifacts.  Actual asset upload to
# GitHub is still done manually via `gh release upload` in the CI
# workflow (see .github/workflows/release.yml), not by electron-builder.
# We pass `--publish never` to the build command to be explicit.
publish:
  provider: github
  owner: swiftruru
  repo: whisperflow-studio
  releaseType: release
directories:
  output: dist

# Versioned artifact names so users can tell at a glance which release
# they're holding on disk.  electron-builder substitutes ${version}
# from package.json automatically.  The release workflow also uploads
# a stable, version-less alias for each artifact so the README's
# `https://github.com/<repo>/releases/latest/download/<file>` buttons
# keep working across every release without editing the README —
# see `.github/workflows/release.yml :: Upload release assets`.
files:
  - src/**
  - preload/**
  - assets/**
  - locales/**
  - settings.example.json
  - NOTICES.md
extraResources:
  - from: python
    to: python
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.pytest_cache/**"
      - "!**/.venv/**"
      - "!**/.venv-test/**"
  - from: bridge
    to: bridge
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: changelog
    to: changelog
    filter:
      - "v*.md"

fileAssociations:
  - ext: mp4
    name: MP4 Video
    role: Viewer
  - ext: mov
    name: QuickTime Movie
    role: Viewer
  - ext: mkv
    name: Matroska Video
    role: Viewer
  - ext: mp3
    name: MP3 Audio
    role: Viewer
  - ext: wav
    name: WAV Audio
    role: Viewer
  - ext: m4a
    name: M4A Audio
    role: Viewer
  - ext: flac
    name: FLAC Audio
    role: Viewer

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  category: public.app-category.utilities
  artifactName: WhisperFlow-Studio-${version}-mac-${arch}.${ext}

win:
  target: nsis
  icon: assets/icon.png
  artifactName: WhisperFlow-Studio-${version}-win-x64.${ext}

linux:
  target: AppImage
  icon: assets/icon.png
  artifactName: WhisperFlow-Studio-${version}-linux-x86_64.${ext}
