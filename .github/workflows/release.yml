name: Build & Release

# Triggers automatically when a GitHub Release is created (via "gh release create" or GitHub UI)
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: "dist/*.dmg"
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: "dist/*.exe"
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: "dist/*.AppImage"

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest ffmpeg-python numpy

      - name: Run whisperflow unit tests
        shell: bash
        working-directory: python
        run: python -m pytest whisperflow/tests/ -q

      - name: Install Node dependencies
        run: npm ci

      - name: i18n lint
        run: npm run i18n:lint

      - name: Build
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload release assets
        shell: bash
        # Upload every built artifact twice:
        #   1. Under its real versioned name (what electron-builder
        #      produced — e.g. WhisperFlow-Studio-1.5.0-arm64.dmg) so
        #      users who download from the Release page can tell at
        #      a glance which version they're holding.
        #   2. Under a stable, version-less alias (e.g.
        #      WhisperFlow-Studio-arm64.dmg) so the README's
        #      `https://github.com/.../releases/latest/download/<file>`
        #      buttons keep resolving across every release without
        #      editing the README.
        #
        # The alias is derived by stripping any `-X.Y.Z` segment from
        # the filename.  `--clobber` lets us safely re-run this step
        # (or a failed workflow) against the same release without
        # tripping over "asset already exists".
        run: |
          for f in ${{ matrix.artifact_glob }}; do
            [ -f "$f" ] || continue
            gh release upload "${{ github.ref_name }}" "$f" --clobber
            base=$(basename "$f")
            alias=$(printf '%s' "$base" | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+//')
            if [ "$alias" != "$base" ]; then
              cp "$f" "dist/$alias"
              gh release upload "${{ github.ref_name }}" "dist/$alias" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
