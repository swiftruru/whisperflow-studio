name: Build & Release

# Triggers automatically when a GitHub Release is created (via "gh release create" or GitHub UI)
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: "dist/*.dmg"
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: "dist/*.exe"
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: "dist/*.AppImage"

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest ffmpeg-python numpy

      - name: Run whisperflow unit tests
        shell: bash
        working-directory: python
        run: python -m pytest whisperflow/tests/ -q

      - name: Install Node dependencies
        run: npm ci

      - name: i18n lint
        run: npm run i18n:lint

      - name: Build
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload release assets
        shell: bash
        # Upload every built artifact twice:
        #   1. Under its real versioned name (what electron-builder
        #      produced — e.g. WhisperFlow-Studio-1.5.0-arm64.dmg) so
        #      users who download from the Release page can tell at
        #      a glance which version they're holding.
        #   2. Under a stable, version-less alias (e.g.
        #      WhisperFlow-Studio-arm64.dmg) so the README's
        #      `https://github.com/.../releases/latest/download/<file>`
        #      buttons keep resolving across every release without
        #      editing the README.
        #
        # The alias is derived by stripping any `-X.Y.Z` segment from
        # the filename.  `--clobber` lets us safely re-run this step
        # (or a failed workflow) against the same release without
        # tripping over "asset already exists".
        run: |
          for f in ${{ matrix.artifact_glob }}; do
            [ -f "$f" ] || continue
            gh release upload "${{ github.ref_name }}" "$f" --clobber
            base=$(basename "$f")
            alias=$(printf '%s' "$base" | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+//')
            if [ "$alias" != "$base" ]; then
              cp "$f" "dist/$alias"
              gh release upload "${{ github.ref_name }}" "dist/$alias" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload electron-updater metadata
        shell: bash
        # electron-builder generates `latest.yml` (Windows),
        # `latest-mac.yml` (macOS), and `latest-linux.yml` (Linux)
        # next to the installers.  electron-updater on Windows NSIS
        # needs `latest.yml` as a release asset so it can verify the
        # SHA512 of the downloaded installer before running it.
        # Upload whichever metadata file exists on this platform's
        # build — failing to find one is expected on other platforms
        # and shouldn't fail the step.
        run: |
          for f in dist/latest*.yml; do
            [ -f "$f" ] || continue
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    # Runs once after every platform build has finished, on a single
    # Linux runner.  We prepend the bilingual "which file should I
    # download?" guide (.github/release-download-guide.md) to the
    # existing release body so users landing on the GitHub release
    # page immediately see a download recommendation and don't have
    # to guess which of the 10+ assets to click.
    #
    # The guide contains a `<!-- download-guide -->` marker so a
    # re-run of the workflow (or a manual re-tag) won't double-
    # prepend.  `__VERSION__` inside the guide is replaced with the
    # tag name stripped of its leading `v`.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepend download guide to release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          CURRENT_BODY=$(gh release view "$TAG" --json body -q .body)
          if printf '%s' "$CURRENT_BODY" | grep -q '<!-- download-guide -->'; then
            echo "Download guide already present; skipping."
            exit 0
          fi
          GUIDE_FILE=.github/release-download-guide.md
          if [ ! -f "$GUIDE_FILE" ]; then
            echo "::warning::$GUIDE_FILE not found; leaving release body unchanged."
            exit 0
          fi
          sed "s/__VERSION__/${VERSION}/g" "$GUIDE_FILE" > /tmp/guide.md
          {
            cat /tmp/guide.md
            printf '\n'
            printf '%s' "$CURRENT_BODY"
          } > /tmp/body.md
          gh release edit "$TAG" --notes-file /tmp/body.md
